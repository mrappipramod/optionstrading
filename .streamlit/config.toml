[theme]
base = "light"
primaryColor = "#0284c7"          # Richer, slightly darker Sky Blue for better contrast
backgroundColor = "#f8fafc"       # Lighter, cleaner background (Slate 50)
secondaryBackgroundColor = "#ffffff" # Pure white for cards/sidebar
textColor = "#0f172a"             # Deep Navy/Slate (Slate 900) for razor-sharp text
font = "sans serif"
